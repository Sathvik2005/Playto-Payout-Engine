name: Backend Postgres CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-postgres-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-postgres-ci.yml'

jobs:
  payouts-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: playto_payouts_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d playto_payouts_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: '*'
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: playto_payouts_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      CELERY_TASK_ALWAYS_EAGER: 'True'
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET_KEY: ci-jwt-secret
      JWT_ACCESS_TTL_SECONDS: '3600'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run payout test suite
        run: python manage.py test payouts
